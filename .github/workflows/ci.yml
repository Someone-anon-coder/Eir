name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # Phase 7: the narrowest grant that lets ci-action read/post/update a
    # single PR comment — nothing else. Deliberately declared here rather
    # than inherited from repo-wide default permissions, since this
    # workflow file is exactly what an adopter copies into their own repo
    # (see the token/permission Understanding Gate, session 2026-07-12).
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter playwright-eir build

      - run: pnpm --filter ci-action build

      - run: pnpm lint

      - run: pnpm typecheck

      # Phase 9 hardening (NOTE-005): playwright-eir's own unit suite now
      # includes a real-browser proving test (a live false heal + Mechanism
      # A's rejection of it, packages/eir/src/acceptance/), so Chromium has
      # to exist before `pnpm test`, not just before the demo-app e2e step
      # below. One install serves both — Playwright's browser cache isn't
      # per-package.
      - run: pnpm --filter demo-app exec playwright install --with-deps chromium

      - run: pnpm test

      # Dogfood demo (A4, 1.0.0 closure — generalized from Phase 7's
      # one-time exact branch name): applies a real, seeded id-rename
      # mutation (packages/benchmark's own `buildMutationRun`, the same
      # machinery the benchmark's baseline table uses) to Ward, scoped to
      # any branch under the `eir-dogfood/` prefix so the demo is
      # repeatable by anyone — including an external fork — not a one-time
      # branch name that can never fire again. Every other branch and PR
      # is unaffected; Phase 4's invisibility guarantee for
      # VITE_EIR_MUTATIONS holds for everyone outside this prefix. Login
      # targets are excluded because renaming them cascades into blocking
      # nearly every other spec (they all need to log in first), which
      # would demonstrate a login outage, not selector drift.
      - name: Apply dogfood mutation (eir-dogfood/* branches only)
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'eir-dogfood/')
        run: |
          PAYLOAD=$(pnpm --filter benchmark mutation-payload --class id-rename --seed 42 --exclude-prefix login.)
          echo "VITE_EIR_MUTATIONS<<EOF" >> "$GITHUB_ENV"
          echo "$PAYLOAD" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - run: pnpm --filter demo-app e2e

      # Phase 4 DoD: CI runs one fast bench class as a smoke check on the
      # mutation harness itself — not the full 8-class baseline (that's a
      # deliberate, manually-run/committed artifact, not a CI gate).
      - run: pnpm bench --class id-rename --seed 42

      # Phase 7: screenshots are never inlined into the PR comment — GitHub
      # strips `data:` URI image sources from comment bodies (confirmed
      # live against a real comment's rendered HTML), and Blueprint §6
      # rules out hosting them anywhere else ("local files + CI artifacts
      # only"). Uploading the report directory as a workflow artifact is
      # that "CI artifact" — the comment links to this run, not to an image.
      - name: Upload Eir report artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: eir-report
          path: packages/demo-app/eir-report
          if-no-files-found: ignore

      # Posts or updates the single Eir report comment on this PR. `if:
      # always()` so it still runs when the dogfood mutation (or any other
      # real selector drift) makes the e2e step above fail — the comment is
      # informational, separate from the job's own pass/fail signal, and
      # reviewers should see it either way.
      - name: Post Eir report comment
        if: always() && github.event_name == 'pull_request'
        uses: ./packages/ci-action
        with:
          github-token: ${{ github.token }}
          report-path: packages/demo-app/eir-report/eir-report.json
          mode: suggest-only
