name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter playwright-eir build

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm --filter demo-app exec playwright install --with-deps chromium

      - run: pnpm --filter demo-app e2e

      # Phase 4 DoD: CI runs one fast bench class as a smoke check on the
      # mutation harness itself — not the full 8-class baseline (that's a
      # deliberate, manually-run/committed artifact, not a CI gate).
      - run: pnpm bench --class id-rename --seed 42
